<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Đỗ NV1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Be+Vietnam+Pro:wght@400;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 820px;
    height: 460px;
    overflow: hidden;
    background: #020c1a;
    font-family: 'Be Vietnam Pro', sans-serif;
    position: relative;
  }

  /* Animated background particles */
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  /* Floating molecules decorative */
  .molecule {
    position: absolute;
    border-radius: 50%;
    opacity: 0.15;
    animation: float 6s ease-in-out infinite;
  }
  .molecule-1 { width: 180px; height: 180px; background: radial-gradient(circle, #00e5ff, transparent); top: -40px; left: -40px; animation-delay: 0s; }
  .molecule-2 { width: 120px; height: 120px; background: radial-gradient(circle, #b2ff59, transparent); bottom: -30px; right: 60px; animation-delay: 2s; }
  .molecule-3 { width: 90px; height: 90px; background: radial-gradient(circle, #ea80fc, transparent); top: 40px; right: -20px; animation-delay: 1s; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-15px) scale(1.05); }
  }

  /* Chemical formula tag */
  .formula-tag {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: #00e5ff;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 4px;
  }

  /* Main title */
  .main-title {
    font-family: 'Times New Roman', Times, serif;
    font-size: 52px;
    font-weight: 900;
    line-height: 1;
    text-align: center;
    background: linear-gradient(135deg, #00e5ff 0%, #b2ff59 40%, #ffffff 70%, #ea80fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(0,229,255,0.4));
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(0,229,255,0.4)); }
    50% { filter: drop-shadow(0 0 35px rgba(178,255,89,0.6)); }
  }

  /* Sub title */
  .sub-title {
    font-size: 17px;
    font-weight: 600;
    color: #e0f7fa;
    letter-spacing: 1px;
    text-align: center;
    opacity: 0.9;
  }

  .sub-title span {
    color: #b2ff59;
    font-weight: 800;
  }

  /* Divider molecule chain */
  .divider {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 6px 0;
  }
  .atom {
    width: 10px; height: 10px;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  .bond { width: 24px; height: 2px; background: rgba(0,229,255,0.4); border-radius: 2px; }
  .a1 { background: #00e5ff; box-shadow: 0 0 8px #00e5ff; animation-delay: 0s; }
  .a2 { background: #b2ff59; box-shadow: 0 0 8px #b2ff59; animation-delay: 0.3s; }
  .a3 { background: #ea80fc; box-shadow: 0 0 8px #ea80fc; animation-delay: 0.6s; }
  .a4 { background: #ffca28; box-shadow: 0 0 8px #ffca28; animation-delay: 0.9s; }
  .a5 { background: #ff5252; box-shadow: 0 0 8px #ff5252; animation-delay: 1.2s; }
  .a6 { background: #00e5ff; box-shadow: 0 0 8px #00e5ff; animation-delay: 1.5s; }
  .a7 { background: #b2ff59; box-shadow: 0 0 8px #b2ff59; animation-delay: 1.8s; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.7; }
  }

  /* Message */
  .message {
    font-size: 15px;
    color: rgba(255,255,255,0.75);
    text-align: center;
    line-height: 1.6;
    max-width: 560px;
    font-style: italic;
  }

  .message strong {
    color: #ffca28;
    font-style: normal;
    font-weight: 800;
  }

  /* Element badges */
  .elements {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  .el {
    width: 52px; height: 58px;
    border: 1.5px solid;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    backdrop-filter: blur(4px);
  }

  .el-num { font-size: 9px; font-family: 'Orbitron', monospace; position: absolute; top: 4px; left: 6px; opacity: 0.7; }
  .el-sym { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 900; line-height: 1; }
  .el-name { font-size: 7px; letter-spacing: 0.5px; opacity: 0.7; margin-top: 2px; }

  .el-1 { border-color: #00e5ff; color: #00e5ff; background: rgba(0,229,255,0.07); }
  .el-2 { border-color: #b2ff59; color: #b2ff59; background: rgba(178,255,89,0.07); }
  .el-3 { border-color: #ea80fc; color: #ea80fc; background: rgba(234,128,252,0.07); }
  .el-4 { border-color: #ffca28; color: #ffca28; background: rgba(255,202,40,0.07); }
  .el-5 { border-color: #ff5252; color: #ff5252; background: rgba(255,82,82,0.07); }

  /* Bottom watermark */
  .watermark {
    position: absolute;
    bottom: 12px;
    right: 18px;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
  }

  /* Hexagon grid background */
  .hex-bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: 
      repeating-linear-gradient(60deg, rgba(0,229,255,0.03) 0, rgba(0,229,255,0.03) 1px, transparent 1px, transparent 50%),
      repeating-linear-gradient(120deg, rgba(0,229,255,0.03) 0, rgba(0,229,255,0.03) 1px, transparent 1px, transparent 50%),
      repeating-linear-gradient(0deg, rgba(0,229,255,0.03) 0, rgba(0,229,255,0.03) 1px, transparent 1px, transparent 50%);
    background-size: 40px 40px;
    z-index: 1;
  }

  /* Glow orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    z-index: 2;
    pointer-events: none;
  }
  .orb-1 { width: 300px; height: 300px; background: rgba(0,80,120,0.5); top: -100px; left: -80px; }
  .orb-2 { width: 200px; height: 200px; background: rgba(40,80,0,0.4); bottom: -60px; right: 100px; }
  .orb-3 { width: 150px; height: 150px; background: rgba(80,0,100,0.3); top: 50px; right: 0; }
</style>
</head>
<body>

<div class="hex-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="molecule molecule-1"></div>
<div class="molecule molecule-2"></div>
<div class="molecule molecule-3"></div>

<canvas id="particles"></canvas>

<div class="container">
  <div class="formula-tag">⚗️ H₂O + C₆H₁₂O₆ + Nỗ Lực → Thành Công ⚗️</div>

  <div class="main-title">CHÚC ĐỖ<br>NV1 🎓</div>

  <div class="divider">
    <div class="atom a1"></div><div class="bond"></div>
    <div class="atom a2"></div><div class="bond"></div>
    <div class="atom a3"></div><div class="bond"></div>
    <div class="atom a4"></div><div class="bond"></div>
    <div class="atom a5"></div><div class="bond"></div>
    <div class="atom a6"></div><div class="bond"></div>
    <div class="atom a7"></div>
  </div>

  <div class="sub-title">
    Gửi tới các <span>anh chị</span> môn Hoá Học 🧪
  </div>

  <div class="message">
    Mọi phản ứng đều cần <strong>chất xúc tác</strong> — và chất xúc tác của các anh chị<br>
    chính là <strong>đam mê & nỗ lực</strong>. Chúc phản ứng thành công rực rỡ! ✨
  </div>

  <div class="elements">
    <div class="el el-1"><span class="el-num">1</span><span class="el-sym">H</span><span class="el-name">Hy vọng</span></div>
    <div class="el el-2"><span class="el-num">7</span><span class="el-sym">N</span><span class="el-name">Nỗ lực</span></div>
    <div class="el el-3"><span class="el-num">12</span><span class="el-sym">Mg</span><span class="el-name">Năng lượng</span></div>
    <div class="el el-4"><span class="el-num">26</span><span class="el-sym">Fe</span><span class="el-name">Ý chí sắt</span></div>
    <div class="el el-5"><span class="el-num">∞</span><span class="el-sym">NV1</span><span class="el-name">Đỗ rồi!</span></div>
  </div>
</div>

<div class="watermark">CHEM • 2026</div>

<script>
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  canvas.width = 820;
  canvas.height = 460;

  const particles = [];
  const symbols = ['H₂', 'O₂', 'NaCl', 'CO₂', 'NH₃', 'HCl', 'C', 'Fe', 'Na', 'K', '⚗', '🔬'];

  for (let i = 0; i < 28; i++) {
    particles.push({
      x: Math.random() * 820,
      y: Math.random() * 460,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      sym: symbols[Math.floor(Math.random() * symbols.length)],
      opacity: Math.random() * 0.3 + 0.05,
      size: Math.random() * 5 + 8,
      hue: Math.random() > 0.5 ? '#00e5ff' : (Math.random() > 0.5 ? '#b2ff59' : '#ea80fc')
    });
  }

  function drawParticles() {
    ctx.clearRect(0, 0, 820, 460);
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.hue;
      ctx.font = `${p.size}px monospace`;
      ctx.fillText(p.sym, p.x, p.y);
      ctx.restore();

      p.x += p.vx;
      p.y += p.vy;
      if (p.x < -30) p.x = 850;
      if (p.x > 850) p.x = -30;
      if (p.y < -20) p.y = 480;
      if (p.y > 480) p.y = -20;
    });
    requestAnimationFrame(drawParticles);
  }
  drawParticles();
</script>
</body>
</html>
